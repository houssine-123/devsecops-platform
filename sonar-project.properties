sonar.projectKey=devsecops-pfe
sonar.projectName=DevSecOps PFE Platform
sonar.projectVersion=1.0

# Source directories
sonar.sources=app/backend,app/frontend/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/*.spec.js

# Backend (Node.js/JavaScript)
sonar.javascript.lcov.reportPaths=app/backend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (used by Jenkins scanner)
sonar.host.url=http://sonarqube:9000

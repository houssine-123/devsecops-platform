# ============================================================================
# Prometheus Alert Rules
# ============================================================================

groups:
  - name: alertmanager-pipeline
    interval: 15s
    rules:
      - alert: DevSecOpsWatchdog
        expr: vector(1)
        for: 0s
        labels:
          severity: info
          component: monitoring
        annotations:
          summary: "DevSecOps alert pipeline is alive"
          description: "This heartbeat alert confirms that Prometheus can send notifications to Alertmanager."

  # ==========================================================================
  # MACHINE HÔTE (le PC qui héberge la plateforme — job "node-exporter")
  # Seuils élevés : la machine porte Docker + K8s + 17 conteneurs,
  # sa base normale est ~80 % de RAM. On n'alerte que sur un vrai danger.
  # ==========================================================================
  - name: host-machine
    interval: 15s
    rules:
      - alert: HostHighCPU
        expr: |
          (100 - (avg(rate(node_cpu_seconds_total{job="node-exporter",mode="idle"}[5m])) by (instance) * 100)) > 90
        for: 10m
        labels:
          severity: warning
          component: host
        annotations:
          summary: "CPU élevé sur la MACHINE HÔTE"
          description: "La machine hôte (PC de la plateforme) est à {{ $value | printf \"%.1f\" }}% de CPU depuis 10 minutes."
          runbook_url: "https://github.com/houssine-123/devsecops-platform/blob/master/docs/RUNBOOKS.md#hosthighcpu"

      - alert: HostCriticalMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"})) * 100 > 92
        for: 10m
        labels:
          severity: critical
          component: host
        annotations:
          summary: "Mémoire critique sur la MACHINE HÔTE"
          description: "La machine hôte est à {{ $value | printf \"%.1f\" }}% de mémoire — risque d'instabilité de la plateforme."
          runbook_url: "https://github.com/houssine-123/devsecops-platform/blob/master/docs/RUNBOOKS.md#hostcriticalmemory"

  # ==========================================================================
  # SERVEURS SUPERVISÉS (serveurs déployés via l'app + serveur Ubuntu réel)
  # Ce sont les alertes "métier" : elles parlent des serveurs des clients,
  # identifiés par leur nom, pas de la machine qui fait tourner la plateforme.
  # ==========================================================================
  - name: monitored-servers
    interval: 15s
    rules:
      - alert: ServerHighCPU
        expr: |
          (100 - (avg(rate(node_cpu_seconds_total{job=~"dynamic-servers|ubuntu-server-real",mode="idle"}[5m])) by (instance, server_name) * 100)) > 80
        for: 5m
        labels:
          severity: warning
          component: monitored-server
        annotations:
          summary: "CPU élevé sur le serveur {{ $labels.server_name }}{{ $labels.instance }}"
          description: "Le serveur supervisé {{ $labels.server_name }} ({{ $labels.instance }}) est à {{ $value | printf \"%.1f\" }}% de CPU."

      - alert: ServerHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes{job=~"dynamic-servers|ubuntu-server-real"} / node_memory_MemTotal_bytes{job=~"dynamic-servers|ubuntu-server-real"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
          component: monitored-server
        annotations:
          summary: "Mémoire élevée sur le serveur {{ $labels.server_name }}{{ $labels.instance }}"
          description: "Le serveur supervisé {{ $labels.server_name }} ({{ $labels.instance }}) est à {{ $value | printf \"%.1f\" }}% de mémoire."

      - alert: ServerDown
        expr: up{job=~"dynamic-servers|ubuntu-server-real"} == 0
        for: 2m
        labels:
          severity: critical
          component: monitored-server
        annotations:
          summary: "Serveur {{ $labels.server_name }}{{ $labels.instance }} injoignable"
          description: "Le serveur supervisé {{ $labels.server_name }} ({{ $labels.instance }}) ne répond plus au scrape Prometheus depuis 2 minutes."
          runbook_url: "https://github.com/houssine-123/devsecops-platform/blob/master/docs/RUNBOOKS.md#serverdown"

  # ========================================================================
  # Application Metrics
  # ========================================================================
  - name: application
    interval: 15s
    rules:
      - alert: ServiceDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Service Down - Backend"
          description: "Backend service is down. Service {{ $labels.job }} on {{ $labels.instance }} is not responding."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(app_http_requests_total{status=~"5.."}[5m])) by (job)
            /
            sum(rate(app_http_requests_total[5m])) by (job)
          ) * 100 > 5
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High Error Rate - {{ $labels.job }}"
          description: "Error rate is {{ $value }}% for service {{ $labels.job }}."

      - alert: HighResponseTime
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(app_http_request_duration_seconds_bucket[5m])) by (job, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High Response Time"
          description: "95th percentile response time is {{ $value }}s. Performance degradation detected."

      - alert: BackendDatabaseNotReady
        expr: app_database_ready{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Backend database is not ready"
          description: "The backend is running but cannot confirm database readiness."

      # severity info : basé sur les health checks simulés de la démo →
      # visible dans l'app (webhook) mais n'envoie pas d'email
      - alert: DegradedServerDetected
        expr: app_servers_degraded_total{job="backend"} > 0
        for: 1m
        labels:
          severity: info
          component: application
        annotations:
          summary: "Degraded server detected"
          description: "{{ $value }} server(s) are currently marked as degraded by the application."

  # ========================================================================
  # Database Alerts
  # ========================================================================
  - name: database
    interval: 15s
    rules:
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database Connection Failed"
          description: "Unable to connect to PostgreSQL database."
          runbook_url: "https://github.com/houssine-123/devsecops-platform/blob/master/docs/RUNBOOKS.md#databasedown"

  # ========================================================================
  # Container & Pod Alerts (For K8s)
  # ========================================================================
  - name: kubernetes
    interval: 15s
    rules:
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: kubernetes
        annotations:
          summary: "Pod Crash Looping - {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

      - alert: PodNotReady
        expr: |
          min by (pod, namespace) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) == 1
        for: 5m
        labels:
          severity: warning
          component: kubernetes
        annotations:
          summary: "Pod Not Ready - {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready."

      - alert: NodeNotReady
        expr: |
          kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          component: kubernetes
        annotations:
          summary: "Node Not Ready - {{ $labels.node }}"
          description: "Node {{ $labels.node }} is not in Ready state."

  # ========================================================================
  # Backup Alerts
  # ========================================================================
  - name: backups
    interval: 15s
    rules:
      - alert: BackupFailed
        expr: backup_success == 0
        for: 15m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Backup Failed"
          description: "Database backup job failed. Check logs immediately!"

      - alert: BackupNotRunning
        expr: |
          time() - backup_last_successful_timestamp > 86400
        for: 30m
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "No Recent Backups"
          description: "No successful backup in the last 24 hours."

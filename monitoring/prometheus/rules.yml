# ============================================================================
# Prometheus Alert Rules
# ============================================================================

groups:
  - name: infrastructure
    interval: 15s
    rules:
      # ====================================================================
      # CPU Alerts
      # ====================================================================
      - alert: HighCPUUsage
        expr: |
          (100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance) * 100)) > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU Usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on server {{ $labels.instance }}. This may indicate performance issues."

      - alert: CriticalCPUUsage
        expr: |
          (100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (instance) * 100)) > 95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical CPU Usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on server {{ $labels.instance }}. Immediate action required!"

      # ====================================================================
      # Memory Alerts
      # ====================================================================
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High Memory Usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on server {{ $labels.instance }}."

      - alert: CriticalMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical Memory Usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on server {{ $labels.instance }}. Immediate action required!"

      # ====================================================================
      # Disk Space Alerts
      # ====================================================================
      - alert: HighDiskUsage
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})) * 100 > 75
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High Disk Usage on {{ $labels.instance }}"
          description: "Disk usage is {{ $value }}% on {{ $labels.mountpoint }} on server {{ $labels.instance }}."

      - alert: CriticalDiskUsage
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})) * 100 > 90
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Critical Disk Usage on {{ $labels.instance }}"
          description: "Disk usage is {{ $value }}% on {{ $labels.mountpoint }} on server {{ $labels.instance }}. Immediate action required!"

  # ========================================================================
  # Application Metrics
  # ========================================================================
  - name: application
    interval: 15s
    rules:
      - alert: ServiceDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Service Down - Backend"
          description: "Backend service is down. Service {{ $labels.job }} on {{ $labels.instance }} is not responding."

      - alert: HighErrorRate
        expr: |
          (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) / sum(rate(http_requests_total[5m])) by (job)) * 100 > 5
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High Error Rate - {{ $labels.job }}"
          description: "Error rate is {{ $value }}% for service {{ $labels.job }}."

      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High Response Time"
          description: "95th percentile response time is {{ $value }}s. Performance degradation detected."

  # ========================================================================
  # Database Alerts
  # ========================================================================
  - name: database
    interval: 15s
    rules:
      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Database Connection Failed"
          description: "Unable to connect to PostgreSQL database."

  # ========================================================================
  # Container & Pod Alerts (For K8s)
  # ========================================================================
  - name: kubernetes
    interval: 15s
    rules:
      - alert: PodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
          component: kubernetes
        annotations:
          summary: "Pod Crash Looping - {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently."

      - alert: PodNotReady
        expr: |
          min by (pod, namespace) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) == 1
        for: 5m
        labels:
          severity: warning
          component: kubernetes
        annotations:
          summary: "Pod Not Ready - {{ $labels.pod }}"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready."

      - alert: NodeNotReady
        expr: |
          kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: critical
          component: kubernetes
        annotations:
          summary: "Node Not Ready - {{ $labels.node }}"
          description: "Node {{ $labels.node }} is not in Ready state."

  # ========================================================================
  # Backup Alerts
  # ========================================================================
  - name: backups
    interval: 15s
    rules:
      - alert: BackupFailed
        expr: backup_success == 0
        for: 15m
        labels:
          severity: critical
          component: backup
        annotations:
          summary: "Backup Failed"
          description: "Database backup job failed. Check logs immediately!"

      - alert: BackupNotRunning
        expr: |
          time() - backup_last_successful_timestamp > 86400
        for: 30m
        labels:
          severity: warning
          component: backup
        annotations:
          summary: "No Recent Backups"
          description: "No successful backup in the last 24 hours."

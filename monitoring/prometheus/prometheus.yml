# ============================================================================
# Prometheus Configuration
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'devsecops'
    environment: 'development'

# ============================================================================
# Alertmanager Integration
# ============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ============================================================================
# Alert Rules
# ============================================================================
rule_files:
  - 'rules.yml'

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:
  # ========================================================================
  # Prometheus itself
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ========================================================================
  # Node Exporter (System Metrics - CPU, RAM, Disk, Network)
  # ========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: '/metrics'

  # ========================================================================
  # Backend Application (Custom Metrics)
  # ========================================================================
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/api/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ========================================================================
  # cAdvisor (Container Metrics - CPU, RAM per container)
  # ========================================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ========================================================================
  # PostgreSQL Exporter (Database Metrics)
  # ========================================================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ========================================================================
  # Real Ubuntu Server (172.20.10.6) - Node Exporter
  # ========================================================================
  - job_name: 'ubuntu-server-real'
    static_configs:
      - targets: ['172.20.10.6:9100']
        labels:
          instance: 'ubuntu-server-pfe'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ========================================================================
  # Dynamic Servers - auto-registered via file_sd when auto-deploy runs
  # Files are written by the backend to /etc/prometheus/dynamic/*.json
  # ========================================================================
  - job_name: 'dynamic-servers'
    file_sd_configs:
      - files:
          - '/etc/prometheus/dynamic/*.json'
        refresh_interval: 10s
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ========================================================================
  # Kubernetes (when deployed on K8s - uses kube-state-metrics)
  # ========================================================================
  # - job_name: 'kube-state-metrics'
  #   static_configs:
  #     - targets: ['kube-state-metrics:8080']

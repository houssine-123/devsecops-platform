# ============================================================================
# Prometheus Configuration
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'devsecops'
    environment: 'development'

# ============================================================================
# Alertmanager Integration
# ============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# ============================================================================
# Alert Rules
# ============================================================================
rule_files:
  - 'rules.yml'

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:
  # ========================================================================
  # Prometheus itself
  # ========================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ========================================================================
  # Node Exporter (System Metrics)
  # ========================================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: '/metrics'

  # ========================================================================
  # Backend Application
  # ========================================================================
  - job_name: 'backend'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s


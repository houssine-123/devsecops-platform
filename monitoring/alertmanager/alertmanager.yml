# ============================================================================
# Alertmanager Configuration - Local Development
# ============================================================================

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'component', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'backend-webhook'
  routes:
    - matchers:
        - severity="critical"
      receiver: 'backend-critical'
      group_wait: 5s
    - matchers:
        - severity="warning"
      receiver: 'backend-warning'
    - matchers:
        - severity="info"
      receiver: 'backend-webhook'

receivers:
  - name: 'backend-webhook'
    webhook_configs:
      - url: 'http://backend:5000/api/alertmanager/webhook'
        send_resolved: true

  - name: 'backend-critical'
    webhook_configs:
      - url: 'http://backend:5000/api/alertmanager/webhook'
        send_resolved: true

  - name: 'backend-warning'
    webhook_configs:
      - url: 'http://backend:5000/api/alertmanager/webhook'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']

version: '3.9'

services:
  # ============================================================================
  # DATABASE
  # ============================================================================
  postgres:
    image: postgres:14-alpine
    container_name: devsecops-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devsecops-network

  # ============================================================================
  # BACKEND API
  # ============================================================================
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: devsecops-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-appdb}
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-5000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app/backend:/app
      - /app/node_modules  # Si Node.js
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - devsecops-network

  # ============================================================================
  # FRONTEND
  # ============================================================================
  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: devsecops-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 3
    networks:
      - devsecops-network

  # ============================================================================
  # PROMETHEUS
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: devsecops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - devsecops-network

  # ============================================================================
  # GRAFANA
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: devsecops-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - devsecops-network

  # ============================================================================
  # NODE EXPORTER (System Metrics)
  # ============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: devsecops-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - devsecops-network

  # ============================================================================
  # ALERTMANAGER
  # ============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: devsecops-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - devsecops-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  devsecops-network:
    driver: bridge

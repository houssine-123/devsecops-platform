apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: devsecops-platform
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      smtp_from: 'ademmakni545@gmail.com'
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_auth_username: 'ademmakni545@gmail.com'
      smtp_auth_password: 'GMAIL_APP_PASSWORD_HERE'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 5s
          repeat_interval: 30m
        - match:
            severity: warning
          receiver: 'warning'
          group_wait: 30s

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://backend-service:5000/api/alertmanager/webhook'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://backend-service:5000/api/alertmanager/webhook'
            send_resolved: true
        email_configs:
          - to: 'ademmakni545@gmail.com'
            headers:
              Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              Alert:       {{ .Labels.alertname }}
              Severity:    {{ .Labels.severity }}
              Namespace:   {{ .Labels.namespace }}
              Summary:     {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Fired at:    {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
              {{ end }}
            send_resolved: true
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK'
            channel: '#alerts'
            username: 'AlertManager'
            icon_emoji: ':rotating_light:'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: ':rotating_light: [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
            text: |
              *Severity:* {{ .CommonLabels.severity }}
              *Summary:* {{ .CommonAnnotations.summary }}
              {{ range .Alerts }}• {{ .Annotations.description }}{{ end }}

      - name: 'warning'
        webhook_configs:
          - url: 'http://backend-service:5000/api/alertmanager/webhook'
            send_resolved: true
        email_configs:
          - to: 'ademmakni545@gmail.com'
            headers:
              Subject: '[WARNING] {{ .GroupLabels.alertname }} — {{ .CommonAnnotations.summary }}'
            text: |
              {{ range .Alerts }}
              Alert:       {{ .Labels.alertname }}
              Severity:    {{ .Labels.severity }}
              Namespace:   {{ .Labels.namespace }}
              Summary:     {{ .Annotations.summary }}
              Description: {{ .Annotations.description }}
              Fired at:    {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
              {{ end }}
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']

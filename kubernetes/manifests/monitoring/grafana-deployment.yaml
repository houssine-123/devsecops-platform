apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  namespace: devsecops-platform
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.5
        env:
          - name: GF_SECURITY_ADMIN_USER
            value: admin
          - name: GF_SECURITY_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-secret
                key: admin-password
          - name: GF_PATHS_PROVISIONING
            value: /etc/grafana/provisioning
          - name: GF_DASHBOARDS_JSON_ENABLED
            value: "true"
          - name: GF_DASHBOARDS_JSON_PATH
            value: /var/lib/grafana/dashboards
        ports:
          - containerPort: 3000
        volumeMounts:
          - name: provisioning
            mountPath: /etc/grafana/provisioning
          - name: dashboards
            mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards

apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: devsecops-platform
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url: '${SLACK_WEBHOOK_URL}'
      smtp_smarthost: '${SMTP_SMARTHOST}'
      smtp_from: '${ALERT_EMAIL_FROM}'
      smtp_auth_username: '${SMTP_USERNAME}'
      smtp_auth_password: '${SMTP_PASSWORD}'
      smtp_require_tls: true

    route:
      receiver: 'default'
      group_by: ['alertname', 'namespace', 'severity', 'instance']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: 'pager'
          group_wait: 10s
          group_interval: 5m
          repeat_interval: 30m
          continue: true
        - match:
            severity: warning
          receiver: 'warning'
          group_wait: 30s
          group_interval: 10m
        - match:
            component: infrastructure
          receiver: 'infrastructure'
          continue: true
        - match:
            component: application
          receiver: 'application'
          continue: true
        - match:
            component: kubernetes
          receiver: 'kubernetes'
          continue: true
        - match:
            alertname: 'PodDown'
          receiver: 'pager'
          continue: true

    receivers:
      - name: 'default'
        slack_configs:
          - channel: '#alerts'
            title: 'Alert: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true
        email_configs:
          - to: '${ALERT_EMAIL_TO}'
            from: '${ALERT_EMAIL_FROM}'
            smarthost: '${SMTP_SMARTHOST}'
            auth_username: '${SMTP_USERNAME}'
            auth_password: '${SMTP_PASSWORD}'
            headers:
              Subject: 'DevSecOps Alert: {{ .GroupLabels.alertname }}'
            html: |
              <h3>{{ .GroupLabels.alertname }}</h3>
              <p>{{ range .Alerts }}{{ .Annotations.description }}<br/>{{ end }}</p>
        webhook_configs:
          - url: '${WEBHOOK_URL}'
            send_resolved: true
      - name: 'pager'
        slack_configs:
          - channel: '#pager-alerts'
            title: '🚨 PAGE: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}{{ end }}'
            send_resolved: true
        email_configs:
          - to: '${PAGE_EMAIL_TO}'
            from: '${ALERT_EMAIL_FROM}'
            smarthost: '${SMTP_SMARTHOST}'
            auth_username: '${SMTP_USERNAME}'
            auth_password: '${SMTP_PASSWORD}'
            headers:
              Subject: '🚨 PAGE ALERT: {{ .GroupLabels.alertname }}'
            html: |
              <h2 style="color: red;">🚨 PAGE ALERT</h2>
              <h3>{{ .GroupLabels.alertname }}</h3>
              <p>{{ range .Alerts }}{{ .Annotations.summary }}<br/>{{ .Annotations.description }}<br/>{{ end }}</p>
        webhook_configs:
          - url: '${WEBHOOK_URL}'
            send_resolved: true
      - name: 'warning'
        slack_configs:
          - channel: '#alerts'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true
      - name: 'infrastructure'
        slack_configs:
          - channel: '#infrastructure'
            title: 'Infrastructure Alert: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true
      - name: 'application'
        slack_configs:
          - channel: '#application-alerts'
            title: 'Application Alert: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true
      - name: 'kubernetes'
        slack_configs:
          - channel: '#kubernetes-alerts'
            title: 'Kubernetes Alert: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace', 'instance']
      - source_match:
          alertname: 'NodeNotReady'
        target_match_re:
          alertname: 'Pod.*'
        equal: ['instance']

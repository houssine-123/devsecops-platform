apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-deployment
  namespace: devsecops-platform
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:latest
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
        ports:
          - containerPort: 9093
        envFrom:
          - secretRef:
              name: alertmanager-secrets
        volumeMounts:
          - name: alertmanager-config
            mountPath: /etc/alertmanager
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: devsecops-platform
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 3000
    name: http
  # ClusterIP: exposed via ingress-nginx (HTTPS) instead of a direct LoadBalancer
  type: ClusterIP
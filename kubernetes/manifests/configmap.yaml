apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devsecops-platform
data:
  # Backend configuration
  APP_ENV: "production"
  APP_PORT: "5000"
  NODE_ENV: "production"

  # Database configuration
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "appdb"

  # Frontend configuration
  VITE_API_URL: "http://backend-service:5000"

  # PostgreSQL configuration
  POSTGRES_DB: "appdb"
  POSTGRES_USER: "postgres"